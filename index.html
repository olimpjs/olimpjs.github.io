<!DOCTYPE html>
<html>
<head>
    <title>Работа с заявкой</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f5f5f5;
            margin: 0;
            padding: 30px;
        }
        
        h1 {
            text-align: center;
        }
        
        .block {
            max-width: 800px;
            margin: 30px auto;
            padding: 20px;
            background-color: #fff;
            border-radius: 5px;
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.1);
        }
        
        .question {
            font-size: 18px;
            margin-bottom: 20px;
        }
        
        .options {
            display: flex;
            justify-content: center;
        }
        
        button {
            padding: 10px 20px;
            margin: 10px;
            font-size: 16px;
            background-color: #4CAF50;
            color: #fff;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            transition: background-color 0.3s ease;
        }
        
        button:hover {
            background-color: #45A048;
        }
    </style>
</head>
<body>
    <div class="block">
        <h1>Звонок в течении часа после оставленной заявки</h1>
        
        <div class="question">Добрый день/вечер/утро *ИМЯ*</div> 
		Меня зовут ...
		<br>ЦКЗ "Олимп пять".<br>
	<br> Вы оставляли заявку на обратный звонок для получения консультации по программам центра.<br>
	<br> Удобно ли вам сейчас подобрать программу?<br></div>
       
        <div class="options">
            <button onclick="goToOption1()">Да</button>
            <button onclick="goToOption2()">Нет</button>
			
        </div>
    </div>
    
    <script>
        function goToOption1() {
            // Действия для варианта "Да"
            // Например, переход к следующему пункту
            window.location.href = "index_002.html";
        }
        
        function goToOption2() {
            // Действия для варианта "Нет"
            // Например, переход к другому пункту
            window.location.href = "ваша_ссылка_на_пункт2.html";
        }
		
    </script>
